name: promotional-offer harness

on:
  workflow_dispatch:
    inputs:
      trials:
        description: Trials per case and condition (3-6)
        required: false
        default: "3"
        type: choice
        options: ["3", "4", "5", "6"]

permissions:
  contents: read

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: >-
          python3 skills/04-promotional-offer/eval/run_harness.py
          --trials "${{ inputs.trials }}"
          --output promotional-offer-harness-results.json
      - uses: actions/upload-artifact@v4
        with:
          name: promotional-offer-harness
          path: promotional-offer-harness-results.json
