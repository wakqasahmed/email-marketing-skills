name: newsletter editorial harness

on:
  workflow_dispatch:
    inputs:
      runner:
        description: Repository-controlled harness executable path
        required: true
        type: string
      image:
        description: Approved container image containing the runner runtime
        required: true
        type: string
      trials:
        description: Trials per condition and case (3-6)
        required: true
        default: "3"
        type: choice
        options: ["3", "4", "5", "6"]

permissions:
  contents: read

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: >-
          python3 skills/01-newsletter-editorial/eval/run_harness.py
          --runner "${{ inputs.runner }}"
          --image "${{ inputs.image }}"
          --trials "${{ inputs.trials }}"
          --output newsletter-editorial-harness.json
      - uses: actions/upload-artifact@v4
        with:
          name: newsletter-editorial-harness
          path: newsletter-editorial-harness.json
