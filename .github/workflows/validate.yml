name: validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 scripts/validate-plugin.py
      - run: python3 scripts/validate-citations.py
      - run: python3 scripts/validate-orchestration.py
      - run: python3 scripts/validate-list-growth.py
      - run: python3 scripts/validate-deliverability.py
      - run: bash skills/eval/run-eval.sh
      - run: bash skills/00-email-marketing-guardrails/eval/run-eval.sh
      - run: bash skills/01-newsletter-editorial/eval/run-eval.sh
      - run: bash skills/02-welcome-onboarding/eval/run-eval.sh
      - run: bash skills/05-product-launch/eval/run-eval.sh
      - run: bash skills/06-event-webinar/eval/run-eval.sh
